{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow mt-5">
            <div class="card-header py-3">
                <h5 class="mb-0 text-center"><i class="fas fa-user-plus text-primary me-2"></i>Create Account</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label class="form-label text-secondary">Username</label>
                        <input type="text" name="username" class="form-control" required placeholder="Enter username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary">Email</label>
                        <input type="email" name="email" class="form-control" required placeholder="Enter email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary">Password</label>
                        <input type="password" name="password" class="form-control" required placeholder="Min 8 chars, upper, lower, number, special">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-secondary">Confirm Password</label>
                        <input type="password" name="confirm_password" class="form-control" required placeholder="Repeat password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>
                <p class="text-center text-secondary mt-3 mb-0">Already have an account? <a href="{{ url_for('login') }}" class="text-primary">Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
