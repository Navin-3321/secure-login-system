<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureLogin - {% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f1117;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }
        .card {
            background: #1a1d27;
            border: 1px solid #2a2d3e;
            border-radius: 12px;
        }
        .card-header {
            background: #12141f;
            border-bottom: 1px solid #2a2d3e;
            border-radius: 12px 12px 0 0 !important;
        }
        .btn-primary {
            background: #4f6ef7;
            border-color: #4f6ef7;
        }
        .btn-primary:hover {
            background: #3a57e8;
            border-color: #3a57e8;
        }
        .form-control {
            background: #12141f;
            border: 1px solid #2a2d3e;
            color: #e0e0e0;
        }
        .form-control:focus {
            background: #12141f;
            border-color: #4f6ef7;
            color: #e0e0e0;
            box-shadow: 0 0 0 0.2rem rgba(79,110,247,0.25);
        }
        .navbar {
            background: #12141f !important;
            border-bottom: 1px solid #2a2d3e;
        }
        .alert { border-radius: 8px; }
    </style>
</head>
<body>
{% if session.get('user_id') %}
<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold"><i class="fas fa-shield-alt text-primary me-2"></i>SecureLogin</span>
    <div>
        <span class="text-secondary me-3"><i class="fas fa-user me-1"></i>{{ session.username }}</span>
        <a href="{{ url_for('logout') }}" class="btn btn-outline-danger btn-sm">Logout</a>
    </div>
</nav>
{% endif %}

<div class="container py-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'danger' else ('success' if category == 'success' else 'info') }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
